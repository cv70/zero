name: Security CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo audit (vulnerability scanning)
        run: cargo install cargo-audit --force && cargo audit
      - name: Build
        run: cargo build --all
      - name: Run tests
        run: cargo test --all
